<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <link rel="stylesheet" href="style.css" />
  <style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background-color: #000000;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(90deg, rgba(252, 252, 252, 0.07) 1px, transparent 1px),
    linear-gradient(rgba(252, 252, 252, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(252, 252, 252, 0.07) 1px, transparent 1px);
  background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
  pointer-events: none;
}
</style>
</head>
<body>
  <h1>My First CSS Example</h1>
<p>This is a paragraph.</p>
</body>
</html>
