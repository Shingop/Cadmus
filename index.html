<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
 
   <nav class="tabbar">
    <div class="tabs">
      <button class="tab active" data-tab="terminal">CADMUS RESEARCH GROUP</button>
      <button class="tab" data-tab="overview">SITE OVERVIEW</button>
      <button class="tab" data-tab="database">DATABASE</button>
      <button class="tab" data-tab="laboratory">LABORATORY</button>
    </div>
  </nav>
 
  <main>
 
    <section class="page active" id="terminal">
      <h1>Terminal</h1>
      <p>Terminal section content goes here.</p>
    </section>
 
    <section class="page" id="overview">
      <h1>Site Overview</h1>
      <p>Site overview content goes here.</p>
    </section>
 
    <!-- DATABASE PAGE -->
    <section class="page" id="database">
 
      <div class="db-header">
        <div class="db-filepath">
          <span class="filepath-label">FILE PATH</span>
          <div class="filepath-row">
            <span class="filepath-root"><span class="filepath-home-icon">&#x2302;</span> HOME</span>
            <span class="filepath-sep">/ SCP FOUNDATION / GROUPS OF INTERESTS / <span class="filepath-sep-active">CADMUS RESEARCH GROUP</span> </span>
          </div>
        </div>
        <div class="db-actions">
          <button class="db-btn db-btn--icon" title="Up directory">&#x2191;</button>
          <button class="db-btn">&#9783; GRID VIEW</button>
          <button class="db-btn" id="new-item-btn">&#xFF0B; NEW ITEM</button>
        </div>
      </div>
 
      <div class="db-explorer">
        <div class="file-list" id="file-list"></div>
      </div>
 
    </section>
 
    <section class="page" id="laboratory">
      <h1>Laboratory</h1>
      <p>Laboratory content goes here.</p>
    </section>
 
  </main>
 
  <!-- File window modal -->
  <div class="file-overlay" id="file-overlay">
    <div class="file-window" id="file-window">
      <div class="file-window-titlebar">
        <span class="file-window-name" id="file-window-name">untitled</span>
        <div class="file-window-controls">
          <button class="wc-btn wc-close" id="file-window-close">&#10005;</button>
        </div>
      </div>
      <div class="file-window-body" id="file-window-body"></div>
    </div>
  </div>
 
  <!-- New item modal -->
  <div class="new-item-overlay" id="new-item-overlay">
    <div class="new-item-modal">
      <div class="new-item-header">
        <span>NEW FILE</span>
        <button class="wc-btn wc-close" id="new-item-close">&#10005;</button>
      </div>
      <div class="new-item-body">
        <label>FILE NAME</label>
        <input type="text" id="new-file-name" placeholder="e.g. document.txt" />
        <label>CONTENT</label>
        <textarea id="new-file-content" placeholder="Enter file contents..."></textarea>
        <button class="db-btn confirm-btn" id="new-item-confirm">CREATE FILE</button>
      </div>
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
